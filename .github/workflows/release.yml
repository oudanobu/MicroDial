name: Release Build (ChronOxide)

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ] # Trigger on tags like v1.0.0
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build-apk:
    name: Build 32-bit APK (Android 6.0)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: armv7-linux-androideabi # 明确针对 Android 6.0 手表常用的 32 位 ARMv7 架构

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c # 对老旧 Android NDK API 23 支持最稳定的版本

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build 32-bit Native Core (.so)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          NDK_PLATFORM: android-23
        run: |
          cd rust_core
          cargo ndk -t armv7-linux-androideabi build --release --lib

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Fix AndroidX and Jetifier Properties
        run: |
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" >> gradle.properties

      - name: Fix Kotlin Duplicate Classes (Dependency Resolution)
        run: |
          cd android/app
          echo -e "\nconfigurations.all { resolutionStrategy { eachDependency { details -> if (details.requested.group == 'org.jetbrains.kotlin' && (details.requested.name == 'kotlin-stdlib-jdk8' || details.requested.name == 'kotlin-stdlib-jdk7')) { details.useTarget 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } } }" >> build.gradle

      - name: Package 32-bit APK
        run: |
          mkdir -p release-apk
          
          # Copy the built .so to the Android jniLibs folder
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a/
          cp rust_core/target/armv7-linux-androideabi/release/libchronoxide.so android/app/src/main/jniLibs/armeabi-v7a/
          
          echo "Building APK via Gradle..."
          cd android
          
          if [ -f "./gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            gradle assembleRelease
          fi
          
          cp app/build/outputs/apk/release/*.apk ../release-apk/ChronOxide-v1.0.0-armeabi-v7a.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chronoxide-32bit-apk
          path: release-apk/*.apk
          if-no-files-found: warn

  create-release:
    name: Publish to GitHub Releases
    needs: build-apk
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # Only create a release when pushing a version tag
    permissions:
      contents: write
      
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/chronoxide-32bit-apk/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
